name: Publish to NPM

on:
  workflow_dispatch:
    inputs:
      tag:
        description: 'Tag to publish (e.g. v4.3.0). Leave empty to use the latest tag.'
        required: false
        type: string

permissions:
  contents: read
  id-token: write

jobs:
  publish:
    runs-on: ubuntu-latest

    steps:
    - uses: actions/checkout@v6
      with:
        fetch-depth: 0
        fetch-tags: true

    - name: Resolve tag
      id: tag
      run: |
        if [[ -n '${{ inputs.tag }}' ]]; then
          t='${{ inputs.tag }}'
          [[ "$t" == v* ]] || t="v$t"
        else
          t="$(git tag --list 'v*' --sort=-version:refname | head -1)"
        fi
        echo "value=$t" >> "$GITHUB_OUTPUT"

    - uses: actions/checkout@v6
      with:
        ref: ${{ steps.tag.outputs.value }}

    - uses: actions/setup-node@v6
      with:
        node-version: 'lts/*'
        registry-url: 'https://registry.npmjs.org'
        cache: 'npm'

    - run: npm ci

    - run: echo "Publishing from tag ${{ steps.tag.outputs.value }}"

    - run: npm publish
